name: frontend-e2e

# Locks in the S-tier quality bar (ISC-1): lint + production build + Playwright
# E2E (zero console errors, no horizontal overflow, signature features intact)
# on every push/PR that touches the frontend.

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/e2e.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/e2e.yml"]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: E2E (Playwright)
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
