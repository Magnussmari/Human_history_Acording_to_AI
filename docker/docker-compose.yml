services:
  history-daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: human_history_daemon
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PARALLEL_AGENTS=5
      - CYCLE_INTERVAL=60
      - BATCH_SIZE=5
    volumes:
      - ../:/workspace:z
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import json; f=open('/workspace/state/progress.json'); d=json.load(f); print(f\"OK: {len(d['completed'])}\")"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 30s
